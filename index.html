<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Meta Ads Performance Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0f0f11;
    --surface: #17171a;
    --surface2: #1e1e22;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f2;
    --muted: #888890;
    --accent: #4f8fff;
    --accent2: #7c5cfc;
    --green: #3ecf8e;
    --red: #f06060;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }
  body { min-height: 100vh; padding: 0; }

  /* Layout */
  .shell { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 28px 20px; display: flex; flex-direction: column; gap: 6px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .main { padding: 32px 36px; overflow: hidden; }

  /* Sidebar */
  .logo { font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .logo span { color: var(--accent); }
  .section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin: 16px 0 8px; padding: 0 8px; }
  .filter-block { margin-bottom: 4px; }
  .filter-block label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px; padding: 0 2px; }
  .filter-block input[type="date"] {
    width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px;
    color: var(--text); font-family: var(--mono); font-size: 12px; padding: 7px 10px;
    outline: none; color-scheme: dark;
  }
  .filter-block input[type="date"]:focus { border-color: var(--accent); }

  /* Date presets */
  .date-presets { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
  .preset-btn { padding: 4px 9px; font-size: 11px; font-weight: 500; background: var(--surface2); border: 1px solid var(--border2); border-radius: 5px; color: var(--muted); cursor: pointer; font-family: var(--font); transition: all 0.15s; white-space: nowrap; }
  .preset-btn:hover { color: var(--text); border-color: var(--accent); }
  .preset-btn.active { background: rgba(79,143,255,0.15); border-color: var(--accent); color: var(--accent); }

  /* Multi-select dropdown */
  .ms-wrap { position: relative; }
  .ms-trigger {
    width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px;
    color: var(--text); font-family: var(--font); font-size: 12px; padding: 7px 28px 7px 10px;
    text-align: left; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    position: relative;
  }
  .ms-trigger::after { content:''; position:absolute; right:10px; top:50%; transform:translateY(-50%); border:4px solid transparent; border-top:5px solid var(--muted); }
  .ms-trigger.open::after { border-top:none; border-bottom:5px solid var(--muted); transform:translateY(-80%); }
  .ms-trigger:hover { border-color: var(--border2); background: #222226; }
  .ms-dropdown {
    display: none; position: fixed; background: #222226; border: 1px solid var(--border2);
    border-radius: 8px; z-index: 1000; max-height: 220px; overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5); min-width: 200px;
  }
  .ms-dropdown.open { display: block; }
  .ms-search-wrap { padding: 8px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: #222226; }
  .ms-search-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--border2); border-radius: 5px; color: var(--text); font-size: 12px; padding: 5px 8px; font-family: var(--font); outline: none; }
  .ms-option { display: flex; align-items: center; gap: 8px; padding: 7px 12px; font-size: 12px; cursor: pointer; color: var(--text); white-space: nowrap; }
  .ms-option:hover { background: var(--surface2); }
  .ms-option.all-opt { border-bottom: 1px solid var(--border); color: var(--muted); font-size: 11px; position: sticky; top: 0; background: #222226; }
  .ms-option input[type="checkbox"] { accent-color: var(--accent); width: 13px; height: 13px; flex-shrink: 0; }
  .ms-badge { display:inline-flex; align-items:center; justify-content:center; background: rgba(79,143,255,0.15); color: var(--accent); border-radius: 10px; font-size: 10px; font-weight: 600; min-width: 16px; height: 16px; padding: 0 4px; margin-left: 4px; }

  .fetch-btn {
    margin-top: auto; padding: 10px; background: var(--accent); color: #fff;
    border: none; border-radius: 8px; font-family: var(--font); font-size: 13px;
    font-weight: 600; cursor: pointer; letter-spacing: 0.02em; transition: opacity 0.15s;
  }
  .fetch-btn:hover { opacity: 0.85; }
  .fetch-btn:disabled { opacity: 0.4; cursor: default; }



  /* Main header */
  .page-header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 28px; }
  .page-title { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
  .page-sub { font-size: 13px; color: var(--muted); }

  /* Summary cards */
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 32px; }
  .s-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
  .s-card .s-label { font-size: 11px; color: var(--muted); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 8px; }
  .s-card .s-value { font-size: 22px; font-weight: 500; font-family: var(--mono); letter-spacing: -0.02em; }
  .s-card .s-change { font-size: 11px; font-weight: 500; margin-top: 6px; display: flex; align-items: center; gap: 3px; }
  .s-change.up   { color: #3ecf8e; }
  .s-change.down { color: #f06060; }
  .s-change.flat { color: var(--muted); }
  .s-change.inv-up   { color: #f06060; } /* higher is worse, e.g. CPM, costs */
  .s-change.inv-down { color: #3ecf8e; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 0; }
  .tab-btn {
    padding: 8px 16px; font-size: 13px; font-weight: 500; color: var(--muted);
    background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer;
    font-family: var(--font); margin-bottom: -1px; transition: color 0.15s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }

  /* Table */
  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { padding: 11px 14px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); background: var(--surface); white-space: nowrap; border-bottom: 1px solid var(--border); }
  tbody td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text); white-space: nowrap; font-family: var(--mono); font-size: 12px; }
  tbody td:first-child { font-family: var(--font); font-size: 13px; max-width: 260px; overflow: hidden; text-overflow: ellipsis; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--surface2); }
  tfoot td { padding: 10px 14px; font-weight: 600; background: var(--surface); border-top: 1px solid var(--border2); font-family: var(--mono); font-size: 12px; color: var(--text); white-space: nowrap; }
  tfoot td:first-child { font-family: var(--font); }
  th[data-r], td[data-r] { text-align: right; }

  /* Creative preview */
  .thumb { width: 48px; height: 48px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; display: block; transition: transform 0.15s; }
  .thumb:hover { transform: scale(1.08); }
  .thumb-ph { width: 48px; height: 48px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 18px; }
  .preview-col { width: 64px; }

  /* Modal */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 2000; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal-box { background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; padding: 20px; max-width: 680px; width: 92%; position: relative; }
  .modal-close { position: absolute; top: 12px; right: 14px; background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; }
  .modal-img { width: 100%; border-radius: 8px; display: block; }
  .modal-video { width: 100%; border-radius: 8px; display: block; outline: none; background:#000; max-height: 75vh; }
  .thumb-wrap { position: relative; display: inline-block; }
  .play-badge { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .play-badge svg { filter: drop-shadow(0 1px 4px rgba(0,0,0,0.6)); }
  .modal-name { font-size: 11px; color: var(--muted); margin-top: 12px; word-break: break-all; font-family: var(--mono); }

  /* Status */
  .status { padding: 48px; text-align: center; color: var(--muted); font-size: 14px; }
  .status.err { color: var(--red); }
  .dot-loader { display: inline-flex; gap: 5px; }
  .dot-loader span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: blink 1.2s infinite both; }
  .dot-loader span:nth-child(2) { animation-delay: 0.2s; }
  .dot-loader span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

  /* Conditional formatting */
  .cf-green { color: #3ecf8e !important; font-weight: 500; }
  .cf-yellow { color: #f5c842 !important; font-weight: 500; }
  .cf-red { color: #f06060 !important; font-weight: 500; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* Market nav */
  .market-nav { display: flex; align-items: center; gap: 2px; padding: 0 36px; background: var(--surface); border-bottom: 1px solid var(--border); height: 44px; overflow-x: auto; flex-shrink: 0; }
  .market-nav::-webkit-scrollbar { height: 3px; }
  .market-btn { padding: 6px 16px; font-size: 13px; font-weight: 500; color: var(--muted); background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-family: var(--font); white-space: nowrap; height: 44px; transition: color 0.15s; }
  .market-btn:hover { color: var(--text); }
  .market-btn.active { color: var(--text); border-bottom-color: var(--accent); }
  .market-flag { margin-right: 5px; font-size: 15px; }

  /* Adjust layout to account for top nav */
  body { display: flex; flex-direction: column; }
  .shell { flex: 1; }
</style>
</head>
<body>

<nav class="market-nav" id="market-nav">
  <button class="market-btn active" onclick="switchMarket('US')" id="mbtn-US"><span class="market-flag">🇺🇸</span>US</button>
  <button class="market-btn" onclick="switchMarket('UK')" id="mbtn-UK"><span class="market-flag">🇬🇧</span>UK</button>
  <button class="market-btn" onclick="switchMarket('DE')" id="mbtn-DE"><span class="market-flag">🇩🇪</span>Germany</button>
  <button class="market-btn" onclick="switchMarket('AU')" id="mbtn-AU"><span class="market-flag">🇦🇺</span>Australia</button>
  <button class="market-btn" onclick="switchMarket('FR')" id="mbtn-FR"><span class="market-flag">🇫🇷</span>France</button>
  <button class="market-btn" onclick="switchMarket('IE')" id="mbtn-IE"><span class="market-flag">🇮🇪</span>Ireland</button>
  <button class="market-btn" onclick="switchMarket('NL')" id="mbtn-NL"><span class="market-flag">🇳🇱</span>Netherlands</button>
  <button class="market-btn" onclick="switchMarket('CA')" id="mbtn-CA"><span class="market-flag">🇨🇦</span>Canada</button>
</nav>
<div class="shell">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">Meta Ads <span>Report</span></div>



    <div class="section-label">Date range</div>
    <div class="date-presets">
      <button class="preset-btn" onclick="applyPreset(7)" id="preset-7">7d</button>
      <button class="preset-btn active" onclick="applyPreset(14)" id="preset-14">14d</button>
      <button class="preset-btn" onclick="applyPreset(30)" id="preset-30">30d</button>
      <button class="preset-btn" onclick="applyPreset('mtd')" id="preset-mtd">MTD</button>
    </div>
    <div class="filter-block">
      <label>From</label>
      <input type="date" id="date-from" />
    </div>
    <div class="filter-block">
      <label>To</label>
      <input type="date" id="date-to" />
    </div>

    <div class="section-label">Filters</div>
    <div class="filter-block">
      <label>Campaign</label>
      <div class="ms-wrap" id="ms-campaign"></div>
    </div>
    <div class="filter-block">
      <label>Creative name</label>
      <div class="ms-wrap" id="ms-creative"></div>
    </div>
    <div class="filter-block">
      <label>Creative format</label>
      <div class="ms-wrap" id="ms-format"></div>
    </div>
    <div class="filter-block">
      <label>Copy name</label>
      <div class="ms-wrap" id="ms-copy"></div>
    </div>
    <div class="filter-block">
      <label>Landing page</label>
      <div class="ms-wrap" id="ms-lp"></div>
    </div>
    <div class="filter-block">
      <label>Product</label>
      <div class="ms-wrap" id="ms-product"></div>
    </div>
    <div class="filter-block">
      <label>Creative batch</label>
      <div class="ms-wrap" id="ms-batch"></div>
    </div>
    <div class="filter-block">
      <label>Creator vs BAU</label>
      <div class="ms-wrap" id="ms-creatorType"></div>
    </div>

    <div style="height:16px"></div>
    <button class="fetch-btn" id="fetch-btn" onclick="fetchData(true)">Fetch data</button>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="page-header">
      <div class="page-title">Performance Report</div>
      <div class="page-sub" id="page-sub">Select a market and click Refresh</div>
    </div>

    <div class="summary-grid" id="summary-grid" style="display:none"></div>

    <div id="tabs-area" style="display:none">
      <div class="tabs">
        <button class="tab-btn active" onclick="showTab('day')">By day</button>
        <button class="tab-btn" onclick="showTab('week')">By week</button>
        <button class="tab-btn" onclick="showTab('campaign')">By campaign</button>
        <button class="tab-btn" onclick="showTab('creative')">By creative</button>
        <button class="tab-btn" onclick="showTab('copy')">By copy</button>
        <button class="tab-btn" onclick="showTab('lp')">By landing page</button>
        <button class="tab-btn" onclick="showTab('product')">By product</button>
        <button class="tab-btn" onclick="showTab('batch')">By creative batch</button>
        <button class="tab-btn" onclick="showTab('creatorType')">Creator vs BAU</button>
      </div>
      <div id="table-area"></div>
    </div>

    <div class="status" id="status-msg">Enter your access token, set a date range, and click Fetch data.</div>
  </main>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">&#215;</button>
    <div id="modal-media"></div>
    <div class="modal-name" id="modal-name"></div>
  </div>
</div>

<script>
const CUSTOM_CONV_ID = '1177969260913242';
const BASE = 'https://graph.facebook.com/v19.0';

// gbpRate: multiply raw API spend (local currency) by this to get GBP display value
// 1 GBP = 1.2 local currency  =>  local / 1.2 = GBP
const GBP_RATE = 1 / 1.2; // ~0.8333

const MARKETS = {
  US: { name: 'United States', accountId: '920960531290408',   flag: '🇺🇸', symbol: '£', locale: 'en-GB', toGBP: GBP_RATE },
  UK: { name: 'United Kingdom', accountId: '1254534041266387', flag: '🇬🇧', symbol: '£', locale: 'en-GB', toGBP: 1       },
  DE: { name: 'Germany',        accountId: '1303003886419402', flag: '🇩🇪', symbol: '£', locale: 'en-GB', toGBP: GBP_RATE },
  AU: { name: 'Australia',      accountId: '1342489372470853', flag: '🇦🇺', symbol: '£', locale: 'en-GB', toGBP: 1       },
  FR: { name: 'France',         accountId: '240696118970624',  flag: '🇫🇷', symbol: '£', locale: 'en-GB', toGBP: GBP_RATE },
  IE: { name: 'Ireland',        accountId: '732322845361260',  flag: '🇮🇪', symbol: '£', locale: 'en-GB', toGBP: GBP_RATE },
  NL: { name: 'Netherlands',    accountId: '312252235155790',  flag: '🇳🇱', symbol: '£', locale: 'en-GB', toGBP: GBP_RATE },
  CA: { name: 'Canada',         accountId: '1199587291371680', flag: '🇨🇦', symbol: '£', locale: 'en-GB', toGBP: 1       },
};

// Convert a raw API value (local currency) to GBP for the current market
function toGBP(n) {
  const rate = MARKETS[currentMarket]?.toGBP ?? 1;
  return n * rate;
}

// Per-market state — each market has its own data, cache, and filter selections
let currentMarket = 'US';
function AD_ACCOUNT_ID() { return MARKETS[currentMarket].accountId; }

// Per-market isolated state
const marketState = {};
function getState() {
  if(!marketState[currentMarket]) {
    marketState[currentMarket] = {
      rawData: [],
      adIdsByCreative: {},
      creativeCache: {},
      currentTab: 'day',
      selections: Object.fromEntries(FILTER_KEYS.map(k=>[k,new Set()]))
    };
  }
  return marketState[currentMarket];
}

// Proxy getters/setters so existing code works unchanged
function getRawData() { return getState().rawData; }
function setRawData(v) { getState().rawData = v; }

const FILTER_KEYS = ['campaign','creative','format','copy','lp','product','batch','creatorType'];

let currentTab = 'day';
// ── Per-market state shims (so existing code works unchanged) ────
// These are re-evaluated on each market switch
let rawData, adIdsByCreative, creativeCache, selections;
function syncStateShims() {
  const s = getState();
  rawData = s.rawData;
  adIdsByCreative = s.adIdsByCreative;
  creativeCache = s.creativeCache;
  selections = s.selections;
  currentTab = s.currentTab || 'day';
}

// ── Comparison period data ────────────────────────────────────────
// Stored per market key
const compData = {}; // compData[marketCode] = {df, dt, rows}

function getPrevPeriod(df, dt) {
  const [sy,sm,sd] = df.split('-').map(Number);
  const [ey,em,ed] = dt.split('-').map(Number);
  const start = new Date(sy, sm-1, sd);
  const end   = new Date(ey, em-1, ed);
  const days  = Math.round((end - start) / 86400000) + 1;
  const prevEnd   = new Date(start); prevEnd.setDate(prevEnd.getDate() - 1);
  const prevStart = new Date(prevEnd); prevStart.setDate(prevStart.getDate() - (days - 1));
  return { df: isoDate(prevStart), dt: isoDate(prevEnd) };
}

async function fetchDays(df, dt) {
  const dates = [];
  const [dfy,dfm,dfd] = df.split('-').map(Number);
  const [dty,dtm,dtd] = dt.split('-').map(Number);
  const cur = new Date(dfy, dfm-1, dfd);
  const end = new Date(dty, dtm-1, dtd);
  while(cur <= end) { dates.push(isoDate(cur)); cur.setDate(cur.getDate()+1); }

  const BATCH = 10;
  let allRows = [];
  for(let i=0; i<dates.length; i+=BATCH){
    const batch = dates.slice(i, i+BATCH);
    const results = await Promise.all(batch.map(d =>
      fetchAllPages(`act_${AD_ACCOUNT_ID()}/insights`, {
        level:'ad', time_increment:1,
        time_range: JSON.stringify({since:d, until:d}),
        fields:'date_start,campaign_name,ad_name,ad_id,spend,impressions,inline_link_clicks,actions,action_values',
        action_attribution_windows: JSON.stringify(['1d_click']),
        use_unified_attribution_setting: false,
        limit:500
      }).catch(()=>[])
    ));
    allRows = allRows.concat(...results);
  }
  return allRows;
}

function summariseRows(rows) {
  const s=rows.reduce((a,r)=>a+r.spend,0);
  const i=rows.reduce((a,r)=>a+r.impressions,0);
  const c=rows.reduce((a,r)=>a+r.clicks,0);
  const o=rows.reduce((a,r)=>a+r.orders,0);
  const p=rows.reduce((a,r)=>a+(r.purchases||0),0);
  return {
    spend:s, impressions:i, clicks:c, orders:o, purchases:p,
    cpm:   safe(s,i/1000),
    cpc:   safe(s,c),
    ctr:   safe(c*100,i),
    cpPurch: safe(s,p),
    pCvr:  safe(p*100,c),
    cpOrder: safe(s,o),
    cvr:   safe(o*100,c),
    pctNew: safe(o*100,p)
  };
}
syncStateShims(); // init for default market

// ── Market switcher ───────────────────────────────────────────────
function switchMarket(code) {
  if(code === currentMarket) return;
  currentMarket = code;
  syncStateShims();

  // Update nav active state
  document.querySelectorAll('.market-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mbtn-'+code).classList.add('active');

  // Update page title
  const m = MARKETS[code];
  document.querySelector('.page-title').textContent = m.flag + ' ' + m.name + ' — Performance Report';

  // Reset dropdowns
  FILTER_KEYS.forEach(k => buildDropdown(k, []));

  const s = getState();
  if(s.rawData.length) {
    // Already have data for this market — just re-render
    populateDropdowns();
    renderAll();
  } else {
    // No data yet — auto-fetch
    document.getElementById('summary-grid').style.display='none';
    document.getElementById('tabs-area').style.display='none';
    document.getElementById('page-sub').textContent = m.flag + ' ' + m.name;

// ── Ad name parser ────────────────────────────────────────────────
// Market_AudienceType_Audience_Placement_Gender_Age_Creative_Format_Copy_OS_Opt_LP_Bid_ProductSet_Source
function parseAdName(n) {
  if (!n) return {creative:'',format:'',copy:'',lp:'',product:'',batch:''};
  const p = n.split('_');
  const creativeName = p[6]||'';
  // Creative name structure: type-market-product-batch-...  (dash-delimited)
  // e.g. vid-US-Shirts-00268-SITC-...
  const cp = creativeName.split('-');
  const product = cp[2]||'';
  const batch   = cp[3]||'';
  const creatorType = creativeName.toLowerCase().includes('contentcreator') ? 'Content Creator' : 'BAU';
  return { creative: creativeName, format: p[7]||'', copy: p[8]||'', lp: p[11]||'', product, batch, creatorType };
}

// ── Dates ─────────────────────────────────────────────────────────
function isoDate(d) {
  // Use local year/month/day to avoid UTC timezone shift
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function applyPreset(preset) {
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
  let from;
  if(preset === 'mtd') {
    from = new Date(today.getFullYear(), today.getMonth(), 1);
  } else {
    from = new Date(yesterday); from.setDate(yesterday.getDate() - (preset - 1));
  }
  document.getElementById('date-from').value = isoDate(from);
  document.getElementById('date-to').value = isoDate(yesterday);

  // Update active preset button
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  const btnId = preset === 'mtd' ? 'preset-mtd' : `preset-${preset}`;
  const btn = document.getElementById(btnId);
  if(btn) btn.classList.add('active');

  // Re-fetch or re-render if data already loaded
  if(rawData.length) fetchData(true);
}

function clearPresetActive() {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
}

function initDates() {
  applyPreset(7);
}

// ── Graph API helper ──────────────────────────────────────────────
// Read token from URL ?token=... param
const _token = (()=>{ try { return new URLSearchParams(window.location.search).get('token')||''; } catch{ return ''; } })();
function token() { return _token; }

async function graphGet(path, params={}) {
  params.access_token = token();
  const qs = Object.entries(params).map(([k,v])=>`${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&');
  const r = await fetch(`${BASE}/${path}?${qs}`);
  const j = await r.json();
  if (j.error) throw new Error(j.error.message);
  return j;
}

// Fetch all pages in parallel once we know the cursors
async function fetchAllPages(path, params={}) {
  let all = [];

  // Page 1 via authenticated graphGet
  const first = await graphGet(path, params);
  all = all.concat(first.data || []);

  // Subsequent pages: follow next cursors sequentially
  // (Meta pagination cursors encode the previous response — they must be followed in order)
  let next = first.paging?.next;
  let guard = 0;
  while (next && guard < 100) {
    guard++;
    // Append token to cursor URL (it's already in the URL from Meta but re-adding is safe)
    const sep = next.includes('?') ? '&' : '?';
    const authedNext = next.includes('access_token=') ? next : next + sep + 'access_token=' + encodeURIComponent(_token);
    const r = await fetch(authedNext);
    const j = await r.json();
    if (j.error) { console.error('Pagination error:', j.error.message); break; }
    all = all.concat(j.data || []);
    next = j.paging?.next || null;
  }

  return all;
}

// ── LocalStorage cache ────────────────────────────────────────────
function CACHE_KEY() { return `meta_report_${AD_ACCOUNT_ID()}`; }
const CACHE_TTL_MS = 23 * 60 * 60 * 1000; // 23 hours

function saveCache(df, dt, rows) {
  try {
    localStorage.setItem(CACHE_KEY(), JSON.stringify({
      df, dt, rows, savedAt: Date.now()
    }));
  } catch(e) { console.warn('Cache save failed', e); }
}

function loadCache(df, dt) {
  try {
    const raw = localStorage.getItem(CACHE_KEY());
    if(!raw) return null;
    const c = JSON.parse(raw);
    if(c.df !== df || c.dt !== dt) return null; // different date range
    if(Date.now() - c.savedAt > CACHE_TTL_MS) return null; // stale
    return c;
  } catch { return null; }
}

function cacheAgeLabel(savedAt) {
  const mins = Math.round((Date.now() - savedAt) / 60000);
  if(mins < 1) return 'just now';
  if(mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins/60);
  return `${hrs}h ${mins%60}m ago`;
}

// ── Fetch data ────────────────────────────────────────────────────
async function fetchData(forceRefresh=false) {
  if (!token()) {
    setStatus('No access token found. Please open this page with ?token=YOUR_TOKEN in the URL.', true);
    return;
  }
  const df = document.getElementById('date-from').value;
  const dt = document.getElementById('date-to').value;
  if (!df||!dt) { alert('Please select both dates.'); return; }

  const btn = document.getElementById('fetch-btn');
  btn.disabled=true; btn.textContent='Loading…';
  document.getElementById('summary-grid').style.display='none';
  document.getElementById('tabs-area').style.display='none';
  getState().creativeCache={}; getState().adIdsByCreative={}; syncStateShims();

  // ── Try cache first ──────────────────────────────────────────────
  if(!forceRefresh) {
    const cached = loadCache(df, dt);
    if(cached) {
      getState().rawData = cached.rows; syncStateShims();
      rawData.forEach(r => { if(r.creative&&r.adId&&!adIdsByCreative[r.creative]) adIdsByCreative[r.creative]=r.adId; });
      const age = cacheAgeLabel(cached.savedAt);
      const m=MARKETS[currentMarket]; document.getElementById('page-sub').textContent = `${m.flag} ${m.name} · ${df} → ${dt} · ${rawData.length} rows · cached ${age}`;
      populateDropdowns();
      renderAll();
      btn.disabled=false; btn.textContent='Refresh';
      fetchComparisonPeriod(df, dt);
      return;
    }
  }

  // ── Live fetch — one day per request in parallel to avoid 1000-row API cap ──
  setStatus('<div class="dot-loader"><span></span><span></span><span></span></div> Fetching data…');

  try {
    // Build list of all dates in range
    const dates = [];
    // Parse date strings directly as local dates to avoid UTC shift
    const [dfy,dfm,dfd] = df.split('-').map(Number);
    const [dty,dtm,dtd] = dt.split('-').map(Number);
    const cur = new Date(dfy, dfm-1, dfd);
    const end = new Date(dty, dtm-1, dtd);
    while(cur <= end) {
      dates.push(isoDate(cur));
      cur.setDate(cur.getDate() + 1);
    }

    // Fetch all days in parallel (batches of 10 to avoid rate limits)
    const BATCH = 10;
    let allRows = [];
    for(let i = 0; i < dates.length; i += BATCH) {
      const batchDates = dates.slice(i, i + BATCH);
      const pct = Math.round((i / dates.length) * 100);
      setStatus(`<div class="dot-loader"><span></span><span></span><span></span></div> Fetching data… ${pct}%`);
      const batchResults = await Promise.all(batchDates.map(d =>
        fetchAllPages(`act_${AD_ACCOUNT_ID()}/insights`, {
          level: 'ad',
          time_increment: 1,
          time_range: JSON.stringify({since: d, until: d}),
          fields: 'date_start,campaign_name,ad_name,ad_id,spend,impressions,inline_link_clicks,actions,action_values',
          action_attribution_windows: JSON.stringify(['1d_click']),
          use_unified_attribution_setting: false,
          limit: 500
        }).catch(e => { console.warn('Failed day', d, e); return []; })
      ));
      allRows = allRows.concat(...batchResults);
    }

    const rows = allRows;

    rawData = rows.map(row=>{
      const p = parseAdName(row.ad_name);
      const spend=parseFloat(row.spend)||0, impressions=parseInt(row.impressions)||0, clicks=parseInt(row.inline_link_clicks)||0;
      let orders=0, purchases=0;
      if(row.actions){
        // New customer orders — exact custom conversion, 1d_click only
        const exactType = `offsite_conversion.custom.${CUSTOM_CONV_ID}`;
        const c = row.actions.find(a => a.action_type === exactType);
        if(c){ const val = c['1d_click']; orders = val != null ? parseFloat(val) : 0; }
        // All purchases (omni_purchase) — 1d_click only
        const p2 = row.actions.find(a => a.action_type === 'omni_purchase' || a.action_type === 'purchase');
        if(p2){ const val = p2['1d_click']; purchases = val != null ? parseFloat(val) : 0; }
      }
      if(p.creative&&row.ad_id&&!adIdsByCreative[p.creative]) adIdsByCreative[p.creative]=row.ad_id;
      return {date:row.date_start, campaign:row.campaign_name||'', adId:row.ad_id||'', creative:p.creative, format:p.format, copy:p.copy, lp:p.lp, product:p.product, batch:p.batch, creatorType:p.creatorType, spend, impressions, clicks, orders, purchases};
    });

    if(!rawData.length){ setStatus('No data returned for this date range.',true); btn.disabled=false; btn.textContent='Fetch data'; return; }

    getState().rawData = rawData; saveCache(df, dt, rawData);
    const now = new Date();
    const timeStr = now.toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});
    const m2=MARKETS[currentMarket]; document.getElementById('page-sub').textContent = `${m2.flag} ${m2.name} · ${df} → ${dt} · ${rawData.length} rows · updated ${timeStr}`;
    populateDropdowns();
    renderAll();
    // Fetch comparison period in background (don't await — non-blocking)
    fetchComparisonPeriod(df, dt);
  } catch(e) {
    setStatus('Error: '+e.message, true);
  } finally {
    btn.disabled=false; btn.textContent='Refresh';
  }
}

// ── Creative thumbnails ───────────────────────────────────────────
async function getCreativeAsset(creativeName, adId) {
  if(creativeCache[creativeName]!==undefined) return creativeCache[creativeName];
  if(!adId){ creativeCache[creativeName]=null; return null; }

  try {
    const adData = await graphGet(adId, {
      fields:'creative{id,image_hash,image_url,thumbnail_url,object_story_spec,asset_feed_spec,video_id}'
    });
    const cr = adData?.creative;
    if(!cr){ creativeCache[creativeName]=null; return null; }

    const oss = cr.object_story_spec;

    // ── VIDEO: collect all possible video IDs ─────────────────────
    const videoId =
      cr.video_id ||
      oss?.video_data?.video_id ||
      oss?.link_data?.child_attachments?.[0]?.video_id ||
      cr.asset_feed_spec?.videos?.[0]?.video_id ||
      null;

    if(videoId){
      try {
        // Request source + multiple format URLs + best thumbnails
        const vid = await graphGet(videoId, {
          fields:'source,format{picture,video_url,width},thumbnails{uri,width,height},permalink_url'
        });

        // Pick widest thumbnail for table cell
        const thumbs = (vid.thumbnails?.data||[]).slice().sort((a,b)=>(b.width||0)-(a.width||0));
        const thumbUrl = thumbs[0]?.uri || cr.thumbnail_url || null;

        // Try to get the highest-res direct MP4 URL
        // format array contains SD/HD/FullHD variants — pick widest
        let videoUrl = null;
        if(vid.format?.length){
          const formats = vid.format.slice().sort((a,b)=>(b.width||0)-(a.width||0));
          videoUrl = formats[0]?.video_url || null;
        }
        // Fall back to source (may need token appended)
        if(!videoUrl && vid.source){
          // Append access token so CDN allows the request
          const sep = vid.source.includes('?') ? '&' : '?';
          videoUrl = vid.source + sep + 'access_token=' + encodeURIComponent(token());
        }

        if(videoUrl){
          const asset = {type:'video', url:videoUrl, thumbUrl, videoId};
          creativeCache[creativeName]=asset; return asset;
        }

        // If we got a permalink but no direct URL, store as permalink fallback
        if(vid.permalink_url){
          const asset = {type:'video-link', url:vid.permalink_url, thumbUrl, videoId};
          creativeCache[creativeName]=asset; return asset;
        }
      } catch(e){ console.warn('Video fetch failed for', videoId, e); }
    }

    // ── IMAGE ──────────────────────────────────────────────────────
    const tryHash = async (hash) => {
      if(!hash) return null;
      try {
        const d = await graphGet(`act_${AD_ACCOUNT_ID()}/adimages`, {hashes:JSON.stringify([hash]),fields:'url'});
        return d?.data?.[0]?.url || null;
      } catch { return null; }
    };

    let imgUrl = await tryHash(cr.image_hash);
    if(!imgUrl) imgUrl = cr.image_url || null;
    if(!imgUrl && oss) imgUrl = oss.link_data?.image_url || oss.photo_data?.url || null;
    if(!imgUrl){ const fh = cr.asset_feed_spec?.images?.[0]?.hash; if(fh) imgUrl = await tryHash(fh); }
    if(!imgUrl) imgUrl = cr.thumbnail_url || null;

    const asset = imgUrl ? {type:'image', url:imgUrl, thumbUrl:imgUrl} : null;
    creativeCache[creativeName]=asset; return asset;

  } catch(e){ console.error('getCreativeAsset error', e); creativeCache[creativeName]=null; return null; }
}

// Load all visible thumbs in parallel (up to 6 at a time)
async function loadAllThumbs(entries) {
  const CONCURRENCY = 6;
  let i = 0;
  async function next() {
    if(i >= entries.length) return;
    const {idx, name, adId} = entries[i++];
    await loadThumb(idx, name, adId);
    await next();
  }
  await Promise.all(Array.from({length: Math.min(CONCURRENCY, entries.length)}, next));
}

async function loadThumb(idx, name, adId) {
  const asset = await getCreativeAsset(name, adId);
  const cell = document.getElementById('th-'+idx);
  if(!cell) return;
  if(asset){
    const safeName = name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    if(asset.type==='video' || asset.type==='video-link'){
      const th = asset.thumbUrl||'';
      const mtype = asset.type;
      cell.innerHTML = '<div class="thumb-wrap">'
        + '<img class="thumb" src="' + th + '" alt="" style="cursor:pointer" onclick="openModal(\'' + mtype + '\',\'' + asset.url.replace(/'/g,"\\'") + '\',\'' + safeName + '\')" />'
        + '<div class="play-badge"><svg width="22" height="22" viewBox="0 0 22 22"><circle cx="11" cy="11" r="11" fill="rgba(0,0,0,0.45)"/><polygon points="8.5,7 16,11 8.5,15" fill="white"/></svg></div>'
        + '</div>';
    } else {
      cell.innerHTML = '<img class="thumb" src="' + asset.url + '" alt="" onclick="openModal(\'image\',\'' + asset.url.replace(/'/g,"\\'") + '\',\'' + safeName + '\')" />';
    }
  } else {
    cell.innerHTML='<div class="thumb-ph">&#9633;</div>';
  }
}

function populateDropdowns() {

function buildDropdown(key, opts) {
  const wrap=document.getElementById('ms-'+key);
  wrap.innerHTML='';
  const hasSearch=opts.length>5;

  const trigger=document.createElement('button');
  trigger.className='ms-trigger'; trigger.id='mst-'+key; trigger.type='button';
  trigger.textContent='All';
  trigger.onclick=e=>{e.stopPropagation();toggleDD(key);};
  wrap.appendChild(trigger);

  const dd=document.createElement('div');
  dd.className='ms-dropdown'; dd.id='msd-'+key;
  dd.onclick=e=>e.stopPropagation();

  if(hasSearch){
    const sw=document.createElement('div'); sw.className='ms-search-wrap';
    sw.innerHTML=`<input type="text" placeholder="Search…" oninput="filterDD('${key}',this.value)"/>`;
    dd.appendChild(sw);
  }

  const allDiv=document.createElement('div');
  allDiv.className='ms-option all-opt';
  allDiv.innerHTML=`<input type="checkbox" id="ca-${key}" checked onchange="toggleAll('${key}',this.checked)"/><span>Select all</span>`;
  dd.appendChild(allDiv);

  opts.forEach(opt=>{
    const d=document.createElement('div'); d.className='ms-option'; d.dataset.value=opt;
    d.innerHTML=`<input type="checkbox" checked onchange="toggleOpt('${key}',this.closest('.ms-option').dataset.value,this.checked)"/><span title="${opt}">${opt}</span>`;
    dd.appendChild(d);
  });

  // Position dropdown on open
  wrap.appendChild(dd);
  updateLabel(key,opts);
}

function toggleDD(key) {
  const dd=document.getElementById('msd-'+key), tr=document.getElementById('mst-'+key);
  const isOpen=dd.classList.contains('open');
  closeAllDD();
  if(!isOpen){
    dd.classList.add('open'); tr.classList.add('open');
    // Position
    const rect=tr.getBoundingClientRect();
    dd.style.top=(rect.bottom+4)+'px';
    dd.style.left=rect.left+'px';
    dd.style.width=Math.max(rect.width,200)+'px';
  }
}
function closeAllDD(){
  document.querySelectorAll('.ms-dropdown.open').forEach(d=>d.classList.remove('open'));
  document.querySelectorAll('.ms-trigger.open').forEach(t=>t.classList.remove('open'));
}
document.addEventListener('click', closeAllDD);

function filterDD(key, q){
  document.querySelectorAll(`#msd-${key} .ms-option:not(.all-opt)`).forEach(o=>{
    o.style.display=o.dataset.value.toLowerCase().includes(q.toLowerCase())?'':'none';
  });
}
function toggleAll(key,checked){
  selections[key].clear();
  document.querySelectorAll(`#msd-${key} .ms-option:not(.all-opt) input`).forEach(cb=>cb.checked=checked);
  if(!checked) getAllOpts(key).forEach(v=>selections[key].add(v));
  updateLabel(key,getAllOpts(key));
  if(rawData.length) renderAll();
}
function toggleOpt(key,val,checked){
  if(checked) selections[key].delete(val); else selections[key].add(val);
  const a=document.getElementById('ca-'+key); if(a) a.checked=!selections[key].size;
  updateLabel(key,getAllOpts(key));
  if(rawData.length) renderAll();
}
function getAllOpts(key){
  return [...document.querySelectorAll(`#msd-${key} .ms-option:not(.all-opt)`)].map(o=>o.dataset.value);
}
function updateLabel(key,opts){
  const sel=selections[key], t=document.getElementById('mst-'+key); if(!t) return;
  if(!sel.size||!opts.length){ t.textContent='All'; return; }
  const active=opts.length-sel.size;
  t.innerHTML=`${active} of ${opts.length} <span class="ms-badge">${active}</span>`;
}

// ── Data helpers ──────────────────────────────────────────────────
function fmt(n,d=0){
  if(n==null||isNaN(n))return'—';
  const locale = MARKETS[currentMarket]?.locale || 'en-US';
  return Number(n).toLocaleString(locale,{minimumFractionDigits:d,maximumFractionDigits:d});
}
function fmtC(n){
  if(n==null||isNaN(n))return'—';
  return '£' + fmt(toGBP(n), 2);
}
function fmtP(n){ return(n==null||isNaN(n))?'—':fmt(n,2)+'%'; }
function safe(a,b){ return b?a/b:0; }

// ── Conditional formatting ─────────────────────────────────────────
// CPN thresholds in GBP (already in GBP — no conversion needed)
const CPN_THRESHOLDS = {
  US: 71, UK: 46, DE: 44, AU: 52, FR: 54, IE: 51, NL: 38, CA: 81
};

function cpnColor(gbpValue) {
  const base = CPN_THRESHOLDS[currentMarket] || 71;
  if (gbpValue <= base)            return 'cf-green';
  if (gbpValue <= base * 1.05)     return 'cf-yellow';
  return 'cf-red';
}

// For orders: rank-based — top third green, bottom third red, middle neutral
function ordersColor(value, allValues) {
  if (!allValues.length) return '';
  const sorted = [...allValues].filter(v=>v>0).sort((a,b)=>a-b);
  if (!sorted.length) return '';
  const lo = sorted[Math.floor(sorted.length * 0.33)];
  const hi = sorted[Math.floor(sorted.length * 0.67)];
  if (value >= hi) return 'cf-green';
  if (value <= lo && value > 0) return 'cf-red';
  return '';
}

function getFiltered(){
  return rawData.filter(r=>
    (!selections.campaign.size    ||!selections.campaign.has(r.campaign))&&
    (!selections.creative.size    ||!selections.creative.has(r.creative))&&
    (!selections.format.size      ||!selections.format.has(r.format))&&
    (!selections.copy.size        ||!selections.copy.has(r.copy))&&
    (!selections.lp.size          ||!selections.lp.has(r.lp))&&
    (!selections.product.size     ||!selections.product.has(r.product))&&
    (!selections.batch.size       ||!selections.batch.has(r.batch))&&
    (!selections.creatorType.size ||!selections.creatorType.has(r.creatorType))
  );
}

function aggregate(rows,keyFn,withAdId){
  const map={};
  rows.forEach(r=>{
    const k=keyFn(r);
    if(!map[k]) map[k]={key:k,spend:0,impressions:0,clicks:0,orders:0,purchases:0,adId:withAdId?r.adId:null};
    map[k].spend+=r.spend; map[k].impressions+=r.impressions; map[k].clicks+=r.clicks;
    map[k].orders+=r.orders; map[k].purchases+=(r.purchases||0);
  });
  return Object.values(map).map(g=>({...g,
    cpm:     safe(g.spend,g.impressions/1000),
    cpc:     safe(g.spend,g.clicks),
    ctr:     safe(g.clicks*100,g.impressions),
    cpOrder: safe(g.spend,g.orders),
    cvr:     safe(g.orders*100,g.clicks),
    cpPurch: safe(g.spend,g.purchases),
    pCvr:    safe(g.purchases*100,g.clicks),
    pctNew:  safe(g.orders*100,g.purchases)   // % new = new cust orders / purchases
  }));
}

function weekStart(s){
  // Parse date parts directly to avoid timezone shift issues
  const [y,m,day] = s.split('-').map(Number);
  const d = new Date(Date.UTC(y, m-1, day));
  const dow = d.getUTCDay(); // 0=Sun, 6=Sat
  d.setUTCDate(d.getUTCDate() - dow);
  return d.toISOString().slice(0,10);
}

async function fetchComparisonPeriod(df, dt) {

      if(row.actions){
        const exactType=`offsite_conversion.custom.${CUSTOM_CONV_ID}`;
        const c=row.actions.find(a=>a.action_type===exactType);
        if(c){ const v=c['1d_click']; orders=v!=null?parseFloat(v):0; }
        const p2=row.actions.find(a=>a.action_type==='omni_purchase'||a.action_type==='purchase');
        if(p2){ const v=p2['1d_click']; purchases=v!=null?parseFloat(v):0; }
      }
      return {spend,impressions,clicks,orders,purchases};
    });
    compData[key] = summariseRows(mapped);
    renderAll(); // re-render with % changes now available
  } catch(e) { console.warn('Comparison fetch failed', e); }
}

function getCompSummary(df, dt) {
  const prev = getPrevPeriod(df, dt);
  const key = `${currentMarket}_${prev.df}_${prev.dt}`;
  return compData[key] || null;
}

function pctChange(curr, prev) {
  if(!prev || prev === 0) return null;
  return ((curr - prev) / prev) * 100;
}

function changeTag(curr, prev, invert=false) {
  const pct = pctChange(curr, prev);
  if(pct === null) return '';
  const abs = Math.abs(pct);
  const sign = pct >= 0 ? '+' : '−';
  const arrow = pct >= 0 ? '▲' : '▼';
  const isGood = invert ? pct < 0 : pct > 0;
  const isFlat = abs < 0.5;
  let cls = isFlat ? 'flat' : (isGood ? (invert?'inv-down':'up') : (invert?'inv-up':'down'));
  return `<div class="s-change ${cls}">${arrow} ${sign}${fmt(abs,1)}% vs prev period</div>`;
}

function renderSummary(rows){
  const s=rows.reduce((a,r)=>a+r.spend,0),i=rows.reduce((a,r)=>a+r.impressions,0),
        c=rows.reduce((a,r)=>a+r.clicks,0),o=rows.reduce((a,r)=>a+r.orders,0);
  const pur=rows.reduce((a,r)=>a+(r.purchases||0),0);
  const df = document.getElementById('date-from').value;
  const dt = document.getElementById('date-to').value;
  const comp = getCompSummary(df, dt);
  const cur = summariseRows(rows);

  // [label, currentVal formatted, compKey, invert]
  const cards = [
    ['Spend',               fmtC(s),                         'spend',    true ],
    ['Impressions',         fmt(i),                          'impressions',false],
    ['CPM',                 fmtC(safe(s,i/1000)),            'cpm',      true ],
    ['Link clicks',         fmt(c),                          'clicks',   false],
    ['Cost / click',        fmtC(safe(s,c)),                 'cpc',      true ],
    ['CTR',                 fmtP(safe(c*100,i)),             'ctr',      false],
    ['Purchases',           fmt(pur,0),                      'purchases',false],
    ['Cost / purchase',     fmtC(safe(s,pur)),               'cpPurch',  true ],
    ['Purchase CVR',        fmtP(safe(pur*100,c)),           'pCvr',     false],
    ['New cust. orders',    fmt(o,0),                        'orders',   false],
    ['Cost / new cust. order', fmtC(safe(s,o)),              'cpOrder',  true ],
    ['New cust. CVR',       fmtP(safe(o*100,c)),             'cvr',      false],
    ['% New',               fmtP(safe(o*100,pur)),           'pctNew',   false],
  ];

  document.getElementById('summary-grid').innerHTML = cards.map(([l,v,ck,inv])=>{
    const tag = comp ? changeTag(cur[ck], comp[ck], inv) : '';
    return `<div class="s-card"><div class="s-label">${l}</div><div class="s-value">${v}</div>${tag}</div>`;
  }).join('');
}

const COLS=[
  {k:'spend',    l:'Spend',                   f:fmtC},
  {k:'impressions',l:'Impressions',           f:v=>fmt(v)},
  {k:'cpm',      l:'CPM',                     f:fmtC},
  {k:'clicks',   l:'Link clicks',             f:v=>fmt(v)},
  {k:'cpc',      l:'Cost / click',            f:fmtC},
  {k:'ctr',      l:'CTR',                     f:fmtP},
  {k:'purchases',l:'Purchases',               f:v=>fmt(v,0)},
  {k:'cpPurch',  l:'Cost / purchase',         f:fmtC},
  {k:'pCvr',     l:'Purchase CVR',            f:fmtP},
  {k:'orders',   l:'New cust. orders',        f:v=>fmt(v,0)},
  {k:'cpOrder',  l:'Cost / new cust. order',  f:fmtC},
  {k:'cvr',      l:'New cust. CVR',           f:fmtP},
  {k:'pctNew',   l:'% New',                   f:fmtP}
];

function renderTable(rows,tab){
  const cfg={
    day:      {fn:r=>r.date,               lbl:'Date',               sort:(a,b)=>b.key<a.key?-1:1, adId:false},
    week:     {fn:r=>weekStart(r.date),    lbl:'Week starting (Sun)', sort:(a,b)=>a.key<b.key?-1:1, adId:false},
    campaign: {fn:r=>r.campaign,           lbl:'Campaign',           sort:(a,b)=>b.spend-a.spend,   adId:false},
    creative: {fn:r=>r.creative||'(none)', lbl:'Creative name',      sort:(a,b)=>b.spend-a.spend,   adId:true},
    copy:     {fn:r=>r.copy||'(none)',     lbl:'Copy name',          sort:(a,b)=>b.spend-a.spend,   adId:false},
    lp:       {fn:r=>r.lp||'(none)',       lbl:'Landing page',       sort:(a,b)=>b.spend-a.spend,   adId:false},
    product:  {fn:r=>r.product||'(none)',  lbl:'Product',             sort:(a,b)=>b.spend-a.spend,   adId:false},
    batch:    {fn:r=>r.batch||'(none)',    lbl:'Creative batch',      sort:(a,b)=>b.spend-a.spend,   adId:false},
    creatorType:{fn:r=>r.creatorType||'BAU', lbl:'Creative type',     sort:(a,b)=>b.spend-a.spend,   adId:false}
  };
  const {fn,lbl,sort,adId:wAd}=cfg[tab];
  const grouped=aggregate(rows,fn,wAd).sort(sort);
  const thumbEntries=[];

  if(!grouped.length){ document.getElementById('table-area').innerHTML='<div class="status">No data for this view.</div>'; return; }

  const tot=grouped.reduce((a,r)=>({spend:a.spend+r.spend,impressions:a.impressions+r.impressions,clicks:a.clicks+r.clicks,orders:a.orders+r.orders,purchases:a.purchases+(r.purchases||0)}),{spend:0,impressions:0,clicks:0,orders:0,purchases:0});
  Object.assign(tot,{
    cpm:safe(tot.spend,tot.impressions/1000),cpc:safe(tot.spend,tot.clicks),
    ctr:safe(tot.clicks*100,tot.impressions),cpOrder:safe(tot.spend,tot.orders),
    cvr:safe(tot.orders*100,tot.clicks),cpPurch:safe(tot.spend,tot.purchases),
    pCvr:safe(tot.purchases*100,tot.clicks),pctNew:safe(tot.orders*100,tot.purchases)
  });

  const isC=tab==='creative';
  let html=`<div class="table-wrap"><table><thead><tr>`;
  if(isC) html+=`<th class="preview-col">Preview</th>`;
  html+=`<th>${lbl}</th>${COLS.map(c=>`<th data-r>${c.l}</th>`).join('')}</tr></thead><tbody>`;

  // Pre-compute orders values for relative colouring across rows
  const allOrderVals = grouped.map(r=>r.orders);

  grouped.forEach((r,i)=>{
    html+=`<tr>`;
    if(isC){
      const aid=adIdsByCreative[r.key]||r.adId||'';
      const cached=creativeCache[r.key];
      if(cached){
        const safeName = r.key.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
        if(cached.type==='video'){
          const th = cached.thumbUrl||'';
          html+=`<td class="preview-col"><div class="thumb-wrap"><img class="thumb" src="${th}" style="cursor:pointer" onclick="openModal('video','${cached.url.replace(/'/g,"\'")}','${safeName}')"/><div class="play-badge"><svg width="22" height="22" viewBox="0 0 22 22"><circle cx="11" cy="11" r="11" fill="rgba(0,0,0,0.45)"/><polygon points="8.5,7 16,11 8.5,15" fill="white"/></svg></div></div></td>`;
        } else {
          html+=`<td class="preview-col"><img class="thumb" src="${cached.url}" onclick="openModal('image','${cached.url.replace(/'/g,"\'")}','${safeName}')"/></td>`;
        }
      }
      else{ html+=`<td class="preview-col" id="th-${i}"><div class="thumb-ph">&#9633;</div></td>`; if(aid) thumbEntries.push({idx:i,name:r.key,adId:aid}); }
    }
    html+=`<td title="${r.key}">${r.key}</td>`;
    COLS.forEach(c=>{
      let cls = '';
      if(c.k==='orders')   cls = ordersColor(r.orders, allOrderVals);
      if(c.k==='purchases') cls = ordersColor(r.purchases, grouped.map(x=>x.purchases));
      if(c.k==='cpOrder' && r.orders > 0) cls = cpnColor(toGBP(r.cpOrder));
      html+=`<td data-r class="${cls}">${c.f(r[c.k])}</td>`;
    });
    html+=`</tr>`;
  });

  html+=`</tbody><tfoot><tr>`;
  if(isC) html+=`<td></td>`;
  html+=`<td>Total</td>${COLS.map(c=>`<td data-r>${c.f(tot[c.k])}</td>`).join('')}</tr></tfoot></table></div>`;
  document.getElementById('table-area').innerHTML=html;

  // Fire parallel thumb loads after DOM is updated
  if(isC && thumbEntries.length) loadAllThumbs(thumbEntries);
}

function showTab(tab){
  getState().currentTab=tab; currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['day','week','campaign','creative','copy','lp','product','batch','creatorType'][i]===tab);
  });
  if(rawData.length) renderTable(getFiltered(),tab);
}

// ── Modal ─────────────────────────────────────────────────────────
function openModal(type, url, name){
  const media = document.getElementById('modal-media');
  if(type==='video'){
    // Use a blob approach or direct src — also set crossOrigin
    const v = document.createElement('video');
    v.className = 'modal-video';
    v.controls = true;
    v.autoplay = true;
    v.playsInline = true;
    v.preload = 'auto';
    v.style.width = '100%';
    // Try direct src first
    v.src = url;
    v.onerror = () => {
      // If direct playback fails, show a fallback message with open link
      media.innerHTML = `<div style="padding:24px;text-align:center;color:var(--muted)">
        <div style="font-size:14px;margin-bottom:12px;">Video playback blocked by browser security.</div>
        <a href="${url}" target="_blank" rel="noopener" style="color:var(--accent);font-size:13px;text-decoration:underline;">Open video in new tab ↗</a>
      </div>`;
    };
    media.innerHTML = '';
    media.appendChild(v);
  } else if(type==='video-link'){
    // No direct URL available — show thumbnail with link
    const cached = Object.values(creativeCache).find(a=>a&&a.url===url);
    const thumb = cached?.thumbUrl || '';
    media.innerHTML = `<div style="position:relative;cursor:pointer" onclick="window.open('${url}','_blank')">
      ${thumb ? `<img src="${thumb}" style="width:100%;border-radius:8px;opacity:0.85"/>` : ''}
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px">
        <svg width="48" height="48" viewBox="0 0 48 48"><circle cx="24" cy="24" r="24" fill="rgba(0,0,0,0.55)"/><polygon points="19,15 37,24 19,33" fill="white"/></svg>
        <span style="color:white;font-size:12px;background:rgba(0,0,0,0.5);padding:4px 10px;border-radius:4px">Click to open video ↗</span>
      </div>
    </div>`;
  } else {
    media.innerHTML = `<img class="modal-img" src="${url}" alt="" />`;
  }
  document.getElementById('modal-name').textContent = name;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){
  const media = document.getElementById('modal-media');
  // pause video on close
  const vid = media.querySelector('video');
  if(vid){ vid.pause(); }
  media.innerHTML='';
  document.getElementById('modal').classList.remove('open');
}

// ── Status ────────────────────────────────────────────────────────
function setStatus(html,isErr){
  const el=document.getElementById('status-msg');
  el.style.display='block'; el.className='status'+(isErr?' err':'');
  el.innerHTML=html;
}

// Date change re-render — clear preset highlight on manual change
['date-from','date-to'].forEach(id=>document.getElementById(id).addEventListener('change',()=>{
  clearPresetActive();
  if(rawData.length) fetchData(true);
}));

window.addEventListener('DOMContentLoaded', ()=>{
  document.querySelector('.page-title').textContent = '🇺🇸 United States — Performance Report';
  if(token()){
    fetchData(false).then(()=>{
      const sub = document.getElementById('page-sub');
      if(sub){
        const now = new Date();
        const timeStr = now.toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});
        sub.textContent += ' · Last updated ' + timeStr;
      }
    });
  } else {
    setStatus('No access token found in URL. Bookmark this page as: <br><code style="font-size:12px">https://your-site.com/meta-report/?token=YOUR_TOKEN</code>', true);
  document.querySelector('.page-title').textContent = '🇺🇸 United States — Performance Report';
  }
});
